<!DOCTYPE html>
<html>
<head>
    <title>Calculatrice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

    <!-- Ecran -->
    <div class="screen">
        <div id="operation"></div>
        <div id="resultat">0</div>
    </div>

    <!-- Boutons -->
    <div class="buttons">

        <button class="gray" onclick="effacer()">AC</button>
        <button class="gray" onclick="pourcentage()">%</button>
        <button class="gray" onclick="supprimer()">DEL</button>
        <button class="orange" onclick="diviser()">/</button>

        <button onclick="appuyer7()">7</button>
        <button onclick="appuyer8()">8</button>
        <button onclick="appuyer9()">9</button>
        <button class="orange" onclick="multiplier()">*</button>

        <button onclick="appuyer4()">4</button>
        <button onclick="appuyer5()">5</button>
        <button onclick="appuyer6()">6</button>
        <button class="orange" onclick="soustraire()">-</button>

        <button onclick="appuyer1()">1</button>
        <button onclick="appuyer2()">2</button>
        <button onclick="appuyer3()">3</button>
        <button class="orange" onclick="addition()">+</button>

        <button class="zero" onclick="appuyer0()">0</button>
        <button onclick="virgule()">.</button>
        <button class="orange" onclick="egal()">=</button>

    </div>

    <!-- Historique -->
    <div class="history">
        <h3>Historique</h3>
        <div id="liste"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
